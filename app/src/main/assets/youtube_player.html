<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <style>
    html, body, #player { width: 100%; height: 100%; margin: 0; background: #000; overflow: hidden; }
  </style>
</head>
<body>
<div id="player"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const videoId = params.get('video') || '';
  const startSeconds = Math.max(0, Number(params.get('start') || '0'));
  const autoplay = params.get('autoplay') !== '0';
  let player = null;
  let repeatEnabled = false;
  let muted = false;

  function notify(name, ...args) {
    try {
      if (window.Android && typeof window.Android[name] === 'function') {
        window.Android[name](...args);
      }
    } catch (_) {}
  }

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      videoId,
      width: '100%',
      height: '100%',
      playerVars: {
        autoplay: autoplay ? 1 : 0,
        controls: 1,
        playsinline: 1,
        rel: 0,
        modestbranding: 1,
        enablejsapi: 1,
        origin: 'https://appassets.androidplatform.net',
        start: Math.floor(startSeconds)
      },
      events: {
        onReady: (event) => {
          if (muted) event.target.mute();
          notify('onReady');
          if (autoplay) {
            try { event.target.playVideo(); } catch (_) {}
          }
        },
        onStateChange: (event) => {
          notify('onStateChanged', Number(event.data));
          if (event.data === YT.PlayerState.ENDED && repeatEnabled) {
            event.target.seekTo(0, true);
            event.target.playVideo();
          }
        },
        onError: (event) => notify('onError', Number(event.data))
      }
    });
  }

  const script = document.createElement('script');
  script.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(script);

  setInterval(() => {
    if (!player || typeof player.getCurrentTime !== 'function') return;
    try {
      notify('onProgress', Number(player.getCurrentTime() || 0), Number(player.getDuration() || 0));
    } catch (_) {}
  }, 1500);

  window.geoPlay = () => { try { player && player.playVideo(); } catch (_) {} };
  window.geoPause = () => { try { player && player.pauseVideo(); } catch (_) {} };
  window.geoToggle = () => {
    try {
      if (!player) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
    } catch (_) {}
  };
  window.geoMute = (value) => {
    muted = Boolean(value);
    try { if (player) muted ? player.mute() : player.unMute(); } catch (_) {}
  };
  window.geoRate = (value) => {
    try { player && player.setPlaybackRate(Number(value)); } catch (_) {}
  };
  window.geoRepeat = (value) => { repeatEnabled = Boolean(value); };
  window.geoSeek = (seconds) => {
    try { player && player.seekTo(Math.max(0, Number(seconds)), true); } catch (_) {}
  };
  window.geoStop = () => { try { player && player.stopVideo(); } catch (_) {} };
</script>
</body>
</html>
