name: Leer ZIP y crear APK automaticamente

on:
  push:
    paths:
      - "*.zip"
      - "incoming/**/*.zip"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: geo-videos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  importar-y-compilar:
    name: Importar proyecto y compilar APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Encontrar archivo ZIP
        id: zip
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import os
          from pathlib import Path

          archivos = list(Path(".").glob("*.zip"))

          incoming = Path("incoming")
          if incoming.exists():
              archivos.extend(incoming.rglob("*.zip"))

          archivos = [
              archivo
              for archivo in archivos
              if archivo.is_file()
          ]

          if not archivos:
              raise SystemExit(
                  "No se encontro ningun ZIP en la raiz ni en incoming."
              )

          zip_reciente = max(
              archivos,
              key=lambda archivo: archivo.stat().st_mtime
          )

          with open(os.environ["GITHUB_OUTPUT"], "a") as salida:
              salida.write(
                  f"file={zip_reciente.as_posix()}\n"
              )

          print(f"ZIP encontrado: {zip_reciente}")
          PY

      - name: Revisar y extraer ZIP
        shell: bash
        env:
          ZIP_FILE: ${{ steps.zip.outputs.file }}
        run: |
          set -euo pipefail

          TEMP_DIR="$RUNNER_TEMP/geo_videos_extraido"

          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          python3 - "$ZIP_FILE" "$TEMP_DIR" <<'PY'
          import stat
          import sys
          import zipfile
          from pathlib import Path, PurePosixPath

          zip_path = Path(sys.argv[1])
          destino = Path(sys.argv[2])

          limite_total = 3 * 1024 * 1024 * 1024
          total = 0

          with zipfile.ZipFile(zip_path, "r") as archivo:
              elementos = archivo.infolist()

              if not elementos:
                  raise SystemExit("El ZIP esta vacio.")

              for elemento in elementos:
                  nombre = elemento.filename.replace("\\", "/")
                  ruta = PurePosixPath(nombre)

                  if ruta.is_absolute() or ".." in ruta.parts:
                      raise SystemExit(
                          f"Ruta insegura dentro del ZIP: "
                          f"{elemento.filename}"
                      )

                  modo = elemento.external_attr >> 16

                  if stat.S_ISLNK(modo):
                      raise SystemExit(
                          f"Enlace simbolico no permitido: "
                          f"{elemento.filename}"
                      )

                  total += elemento.file_size

                  if total > limite_total:
                      raise SystemExit(
                          "El contenido supera el limite de 3 GB."
                      )

              archivo.extractall(destino)

          print("ZIP extraido correctamente.")
          PY

          rm -rf "$TEMP_DIR/__MACOSX"
          find "$TEMP_DIR" -name ".DS_Store" -delete

      - name: Detectar proyecto Android
        id: project
        shell: bash
        run: |
          set -euo pipefail

          TEMP_DIR="$RUNNER_TEMP/geo_videos_extraido"

          python3 - "$TEMP_DIR" <<'PY'
          import os
          import sys
          from pathlib import Path

          raiz = Path(sys.argv[1])
          candidatos = []

          carpetas = [raiz]

          for carpeta in raiz.rglob("*"):
              if not carpeta.is_dir():
                  continue

              profundidad = len(
                  carpeta.relative_to(raiz).parts
              )

              if profundidad <= 2:
                  carpetas.append(carpeta)

          for carpeta in carpetas:
              tiene_settings = (
                  (carpeta / "settings.gradle").is_file()
                  or
                  (carpeta / "settings.gradle.kts").is_file()
              )

              tiene_app = (carpeta / "app").is_dir()

              if tiene_settings and tiene_app:
                  candidatos.append(carpeta)

          if not candidatos:
              raise SystemExit(
                  "No se encontro un proyecto Android valido."
              )

          candidatos.sort(
              key=lambda carpeta: (
                  len(carpeta.relative_to(raiz).parts),
                  carpeta.as_posix()
              )
          )

          proyecto = candidatos[0]

          with open(os.environ["GITHUB_OUTPUT"], "a") as salida:
              salida.write(
                  f"source={proyecto.as_posix()}\n"
              )

          print(f"Proyecto detectado: {proyecto}")
          PY

      - name: Copiar proyecto al repositorio
        shell: bash
        env:
          ORIGEN: ${{ steps.project.outputs.source }}
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="incoming/" \
            --exclude="*.zip" \
            "$ORIGEN"/ ./

          echo "Proyecto copiado correctamente."

      - name: Comprobar archivos Android
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "app" ]; then
            echo "::error::No existe la carpeta app."
            exit 1
          fi

          if [ ! -f "settings.gradle" ] &&
             [ ! -f "settings.gradle.kts" ]; then
            echo "::error::Falta settings.gradle o settings.gradle.kts."
            exit 1
          fi

          if [ ! -f "build.gradle" ] &&
             [ ! -f "build.gradle.kts" ]; then
            echo "::error::Falta build.gradle o build.gradle.kts."
            exit 1
          fi

          echo "Proyecto Android valido."

      - name: Preparar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Gradle 8.13
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"

      - name: Compilar APK
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "gradle/wrapper/gradle-wrapper.jar" ] &&
             [ -f "gradlew" ]; then

            chmod +x gradlew

            ./gradlew \
              --no-daemon \
              assembleDebug \
              --stacktrace
          else
            echo "::warning::Falta gradle-wrapper.jar."
            echo "Se utilizara Gradle 8.13 instalado por Actions."

            gradle \
              --no-daemon \
              assembleDebug \
              --stacktrace
          fi

      - name: Verificar APK
        shell: bash
        run: |
          set -euo pipefail

          APK_COUNT="$(
            find . \
              -type f \
              -path "*/build/outputs/apk/debug/*.apk" |
            wc -l
          )"

          if [ "$APK_COUNT" -eq 0 ]; then
            echo "::error::No se encontro ninguna APK compilada."
            exit 1
          fi

          echo "APK creada:"
          find . \
            -type f \
            -path "*/build/outputs/apk/debug/*.apk" \
            -print

      - name: Guardar APK para descargar
        uses: actions/upload-artifact@v7
        with:
          name: Geo-Videos-APK-${{ github.run_number }}
          path: |
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Eliminar ZIP y guardar proyecto
        shell: bash
        env:
          ZIP_FILE: ${{ steps.zip.outputs.file }}
        run: |
          set -euo pipefail

          rm -f -- "$ZIP_FILE"

          git config \
            user.name \
            "github-actions[bot]"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No hay cambios que guardar."
            exit 0
          fi

          git commit \
            -m "Importar Geo Videos y compilar APK"

          git pull \
            --rebase \
            origin \
            "$GITHUB_REF_NAME"

          git push \
            origin \
            "HEAD:$GITHUB_REF_NAME"
